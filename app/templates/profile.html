<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>プロフィール - DefenderForDevOps トレーニングアプリ</title>
    <style>
        body { font-family: sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; }
        th { width: 40%; color: #555; }
    </style>
</head>
<body>
    <h1>プロフィール</h1>
    <div class="card">
        <table>
            <tr><th>ユーザー ID</th><td>{{ profile_user.id }}</td></tr>
            <tr><th>表示名</th><td>{{ profile_user.display_name }}</td></tr>
            <tr><th>ユーザー名</th><td>{{ profile_user.username }}</td></tr>
            <tr><th>メール</th><td>{{ profile_user.email }}</td></tr>
            <tr><th>社会保障番号（SSN）</th><td>{{ profile_user.ssn }}</td></tr>
            <tr><th>給与</th><td>{{ profile_user.salary }}</td></tr>
        </table>
    </div>
    <p>
        <a href="{{ url_for('index') }}">トップへ戻る</a> ｜
        <a href="{{ url_for('logout') }}">ログアウト</a>
    </p>
</body>
</html>
